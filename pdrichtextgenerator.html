<script>
function copytext() {
  var copyText = document.createElement("input");
  copyText.value = '<stroke color="'+document.getElementById("textbordercolortop").value+'" thickness="6"><font color="'+document.getElementById("textcolorup").value+'" size="30">'+document.getElementById("textup").value+'<br /></font><font color="'+document.getElementById("textcolordown").value+'"><stroke color="'+document.getElementById("textbordercolordown").value+'" thickness="3">'+document.getElementById("textdown").value+'</stroke></font></stroke>'
  /* Select the text field */
  
  copyText.select();
  copyText.setSelectionRange(0, 1000); /* For mobile devices */

   /* Copy the text inside the text field */
  navigator.clipboard.writeText(copyText.value);

  /* Alert the copied text */
  alert("Copied the text with succes !");
}

function update() {
	//console.log("updated !")
	const zefresf = '&lt;stroke color="'+document.getElementById("textbordercolortop").value+'" thickness="6">&lt;font color="'+document.getElementById("textcolorup").value+'" size="30">'+document.getElementById("textup").value+'&lt;br /></font>&lt;font color="'+document.getElementById("textcolordown").value+'">&lt;stroke color="'+document.getElementById("textbordercolordown").value+'" thickness="3">'+document.getElementById("textdown").value+'&lt;/stroke>&lt;/font>&lt;/stroke>'
	document.getElementById("output").innerHTML = zefresf;
	loop()
};

function loop() {
	setTimeout(() => {update()}, 500);
};

console.log("d")
loop()
</script>
